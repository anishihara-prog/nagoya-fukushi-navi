<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>障害福祉支援ナビ なごや(試作版)</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header__inner">
      <h1 class="app-title">障害福祉支援ナビ <span class="app-title__sub">なごや(試作版)</span></h1>
      <p class="app-tagline">福祉サービス・手続き・ケース別支援を検索</p>
    </div>
  </header>

  <nav class="tabbar" role="tablist" aria-label="メインメニュー">
    <button class="tabbar__btn is-active" data-tab="search" role="tab" aria-selected="true">🔍 検索する</button>
    <button class="tabbar__btn" data-tab="chat" role="tab" aria-selected="false">💬 ケース相談</button>
    <button class="tabbar__btn" data-tab="manage" role="tab" aria-selected="false">🗂 登録・編集</button>
  </nav>

  <div class="notice-bar">
    ⚠️ これは試作版です。掲載情報はサンプルです。実際の支援にあたっては、各区役所・基幹相談支援センター等で最新情報をご確認ください。
  </div>

  <main id="app" class="app-main">
    <p class="loading">読み込み中...</p>
  </main>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="js/data-store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
